services:
  mongo:
    image: mongo:7
    container_name: shopease-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shopease-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/shopease
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-production}
      NODE_ENV: production
    ports:
      - "5000:5000"

volumes:
  mongo_data:
